<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jeu Wavelength</title>

<!-- FAVICONS UNIVERSAUX -->

<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon192.png">
<link rel="apple-touch-icon" sizes="180x180" href="appleicon.png">

<style>

body{

font-family:'Segoe UI',Tahoma,Verdana;
background:#e0e5ec;

margin:0;
padding:20px;

display:flex;
flex-direction:column;
align-items:center;

}

/* LAYOUT */

.main{

display:flex;
gap:25px;
align-items:center;
justify-content:center;
flex-wrap:wrap;

}

/* PANELS */

.panel{

background:#e0e5ec;
padding:20px;
border-radius:20px;

box-shadow:
6px 6px 12px #b8b9be,
-6px -6px 12px #ffffff;

}

/* INDICES */

.clue-panel{

width:150px;
height:120px;

display:flex;
align-items:center;
justify-content:center;

}

.clue-panel textarea{

width:100%;
height:70px;

resize:none;

border:none;
border-radius:12px;

padding:10px;

text-align:center;
font-size:16px;
font-weight:bold;

background:#e0e5ec;

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

outline:none;

}

/* JEU */

#game-container{

width:min(90vw,600px);
height:min(90vw,600px);

position:relative;

}

/* IMAGES */

.layer{

position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:contain;

user-select:none;
pointer-events:none;

}

#roue{

z-index:1;
transform-origin:center;

transition:transform 4s cubic-bezier(.15,1,.3,1);

}

#structure{z-index:2;}

#cache{

z-index:3;
transition:opacity .5s;

}

#aiguille{

z-index:4;

pointer-events:auto;

cursor:grab;

transform-origin:center;

}

#aiguille:active{
cursor:grabbing;
}

.masque{
opacity:0;
}

/* CONTROLES */

.controls{

display:flex;
gap:20px;
margin-top:20px;
justify-content:center;

}

/* BOUTONS */

button{

padding:14px 20px;

font-size:15px;
font-weight:bold;

border:none;
border-radius:40px;

background:white;

box-shadow:
6px 6px 12px #b8b9be,
-6px -6px 12px #ffffff;

cursor:pointer;

}

button:active{

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

}

/* SWITCH */

.switch{

position:relative;
width:110px;
height:50px;

}

.switch input{
display:none;
}

.slider{

position:absolute;
cursor:pointer;
inset:0;

background:#d3d3d3;

border-radius:40px;
transition:.4s;

}

.slider:before{

content:"";

position:absolute;

height:40px;
width:40px;

left:5px;
top:5px;

background:white;

border-radius:50%;

transition:.4s;

}

input:checked + .slider{
background:#4e1c08;
}

input:checked + .slider:before{
transform:translateX(60px);
}

.slider:after{

content:"CLOSE";

position:absolute;

right:15px;
top:14px;

font-size:13px;
color:#777;
font-weight:bold;

}

input:checked + .slider:after{

content:"OPEN";

left:15px;
right:auto;

color:white;

}

/* SCORE */

.score-panel{
width:200px;
}

.score{
font-size:26px;
text-align:center;
margin:10px 0;
font-weight:bold;
}

.player input{

width:100%;

padding:8px;
margin-bottom:10px;

border:none;
border-radius:10px;

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

}

.score-buttons{

display:flex;
justify-content:space-between;

}

.score-buttons button{

font-weight:bold;
color:#1c1d25;

}

.plus2{background:#caae9f;}
.plus3{background:#9e7161;}
.plus4{background:#873632;}

.reset{

margin-top:10px;
background:#c0392b;
color:white;
width:100%;

}

/* MOBILE */

@media (max-width:900px){

.main{

flex-direction:column;

}

.clue-panel{
width:200px;
}

.score-panel{
width:220px;
}

}

</style>

</head>


<body>

<div class="main">

<div class="panel clue-panel">
<textarea placeholder="Indice gauche"></textarea>
</div>

<div>

<div id="game-container">

<img src="roue.png" id="roue" class="layer">
<img src="structure.png" id="structure" class="layer">
<img src="WaveLenght.png" id="cache" class="layer">
<img src="aiguille.png" id="aiguille" class="layer">

</div>

<div class="controls">

<button id="btn-roue">
Tourner la roue
</button>

<label class="switch">
<input type="checkbox" id="switch-cache">
<span class="slider"></span>
</label>

</div>

</div>

<div class="panel clue-panel">
<textarea placeholder="Indice droit"></textarea>
</div>

<div class="panel score-panel">

<h3>Score</h3>

<div class="player">

<input placeholder="Joueur 1">

<div class="score" id="score1">0</div>

<div class="score-buttons">
<button class="plus2" onclick="addScore(1,2)">+2</button>
<button class="plus3" onclick="addScore(1,3)">+3</button>
<button class="plus4" onclick="addScore(1,4)">+4</button>
</div>

</div>

<div class="player">

<input placeholder="Joueur 2">

<div class="score" id="score2">0</div>

<div class="score-buttons">
<button class="plus2" onclick="addScore(2,2)">+2</button>
<button class="plus3" onclick="addScore(2,3)">+3</button>
<button class="plus4" onclick="addScore(2,4)">+4</button>
</div>

</div>

<button class="reset" onclick="resetScores()">RESET SCORE</button>

</div>

</div>

<script>

/* ROUE */

const btnRoue=document.getElementById("btn-roue")
const roue=document.getElementById("roue")

let angleRoueActuel=0

btnRoue.onclick=()=>{

const tours=1440
const angleAleatoire=Math.random()*360

angleRoueActuel+=tours+angleAleatoire

roue.style.transform=`rotate(${angleRoueActuel}deg)`

}

/* CACHE */

const cache=document.getElementById("cache")
const switchCache=document.getElementById("switch-cache")

switchCache.onchange=()=>{

if(switchCache.checked){

cache.classList.add("masque")

}else{

cache.classList.remove("masque")

}

}

/* AIGUILLE MOBILE + SOURIS */

const aiguille=document.getElementById("aiguille")
const container=document.getElementById("game-container")

let drag=false

function rotateNeedle(x,y){

const rect=container.getBoundingClientRect()

const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

const dx=x-cx
const dy=y-cy

let angle=Math.atan2(dy,dx)*(180/Math.PI)+90

aiguille.style.transform=`rotate(${angle}deg)`

}

aiguille.addEventListener("mousedown",()=>drag=true)
window.addEventListener("mouseup",()=>drag=false)

window.addEventListener("mousemove",(e)=>{
if(drag) rotateNeedle(e.clientX,e.clientY)
})

/* TOUCH */

aiguille.addEventListener("touchstart",()=>drag=true)

window.addEventListener("touchend",()=>drag=false)

window.addEventListener("touchmove",(e)=>{

if(!drag) return

let touch=e.touches[0]

rotateNeedle(touch.clientX,touch.clientY)

})

/* SCORE */

let scores=[0,0]

function addScore(player,points){

scores[player-1]+=points

document.getElementById("score"+player).textContent=scores[player-1]

}

function resetScores(){

scores=[0,0]

document.getElementById("score1").textContent=0
document.getElementById("score2").textContent=0

}

</script>

</body>
</html>
