<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Wavelength</title>

<link rel="icon" href="logo.png">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:'Segoe UI',Tahoma,Verdana;
background:#e0e5ec;
}

/* écran orientation */

#rotate{
position:fixed;
inset:0;
background:#e0e5ec;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
font-weight:bold;
z-index:999;
}

@media (orientation:landscape){
#rotate{display:none;}
}

/* TITRE */

.title{
position:absolute;
top:1vh;
width:100%;
text-align:center;
}

.title img{
height:8vh;
}

/* LAYOUT */

.main{
position:absolute;
top:10vh;
bottom:1vh;
left:1vw;
right:1vw;

display:flex;
justify-content:space-between;
align-items:center;
}

/* PANELS */

.panel{
background:#e0e5ec;
border-radius:20px;
padding:12px;

box-shadow:
6px 6px 12px #b8b9be,
-6px -6px 12px #ffffff;
}

/* INDICES */

.clue-panel{
width:14vw;
height:20vh;
display:flex;
align-items:center;
justify-content:center;
}

.clue-panel textarea{

width:100%;
height:80%;

resize:none;
border:none;

border-radius:12px;

padding:10px;

text-align:center;
font-weight:bold;

background:#e0e5ec;

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

}

/* JEU */

.center-zone{
display:flex;
flex-direction:column;
align-items:center;
}

/* ROUE */

#game-container{
width:45vh;
height:45vh;
position:relative;
}

/* IMAGES */

.layer{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
pointer-events:none;
user-select:none;
}

#roue{
transition:transform 4s cubic-bezier(0.15,1,0.3,1);
}

#aiguille{
z-index:5;
pointer-events:none;
}

/* HITBOX */

#hitbox{
position:absolute;
top:0;
left:0;
width:100%;
height:50%;
z-index:10;
cursor:pointer;
}

/* CONTROLES */

.controls{
display:flex;
gap:20px;
margin-top:15px;
}

/* BOUTONS */

button{

padding:10px 18px;
font-size:14px;

border:none;
border-radius:50px;

background:white;

box-shadow:
6px 6px 12px #b8b9be,
-6px -6px 12px #ffffff;

}

button:active{

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

}

/* SWITCH */

.switch{
position:relative;
width:90px;
height:40px;
}

.switch input{display:none;}

.slider{
position:absolute;
inset:0;
background:#d3d3d3;
border-radius:40px;
}

.slider:before{
content:"";
position:absolute;
height:30px;
width:30px;
left:5px;
top:5px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#4e1c08;
}

input:checked + .slider:before{
transform:translateX(50px);
}

/* SCORE */

.score-panel{
width:18vw;
}

.score-panel h2{
margin:5px;
text-align:center;
}

.player{
margin-bottom:15px;
}

.player input{

width:100%;
padding:5px;

border:none;
border-radius:8px;

box-shadow:
inset 3px 3px 6px #b8b9be,
inset -3px -3px 6px #ffffff;

}

.score{
text-align:center;
font-size:22px;
font-weight:bold;
margin:6px;
}

/* BOUTONS SCORE */

.score-buttons{
display:flex;
justify-content:space-between;
gap:5px;
}

.score-buttons button{
font-weight:bold;
color:#1c1d25;
padding:6px 8px;
}

/* COULEURS */

.minus1{background:#ffffff;}
.plus2{background:#caae9f;}
.plus3{background:#9e7161;}
.plus4{background:#873632;color:white;}

.reset{
margin-top:8px;
background:#c0392b;
color:white;
width:100%;
font-weight:bold;
}

</style>
</head>

<body>

<div id="rotate">
Tournez votre téléphone en mode paysage
</div>

<div class="title">
<img src="logofull.png">
</div>

<div class="main">

<div class="panel clue-panel">
<textarea placeholder="..."></textarea>
</div>

<div class="center-zone">

<div id="game-container">

<img src="roue2.png" class="layer" id="roue">
<img src="structure2.png" class="layer">
<img src="cache2.png" class="layer" id="cache">
<img src="aiguille2.png" class="layer" id="aiguille">

<div id="hitbox"></div>

</div>

<div class="controls">

<button id="btn-roue">Tourner la roue</button>

<label class="switch">
<input type="checkbox" id="switch-cache">
<span class="slider"></span>
</label>

</div>

</div>

<div class="panel clue-panel">
<textarea placeholder="..."></textarea>
</div>

<div class="panel score-panel">

<h2>Score</h2>

<div class="player">

<input placeholder="Joueur 1">

<div class="score" id="score1">0</div>

<div class="score-buttons">
<button class="minus1" onclick="addScore(1,-1)">-1</button>
<button class="plus2" onclick="addScore(1,2)">+2</button>
<button class="plus3" onclick="addScore(1,3)">+3</button>
<button class="plus4" onclick="addScore(1,4)">+4</button>
</div>

</div>

<div class="player">

<input placeholder="Joueur 2">

<div class="score" id="score2">0</div>

<div class="score-buttons">
<button class="minus1" onclick="addScore(2,-1)">-1</button>
<button class="plus2" onclick="addScore(2,2)">+2</button>
<button class="plus3" onclick="addScore(2,3)">+3</button>
<button class="plus4" onclick="addScore(2,4)">+4</button>
</div>

</div>

<button class="reset" onclick="resetScores()">RESET SCORE</button>

</div>

</div>

<script>

/* ROUE */

let roue=document.getElementById("roue")
let btn=document.getElementById("btn-roue")

let angle=0

btn.onclick=()=>{

angle+=1440+Math.random()*360

roue.style.transform="rotate("+angle+"deg)"

}

/* CACHE */

let cache=document.getElementById("cache")
let sw=document.getElementById("switch-cache")

sw.onchange=()=>{

cache.style.opacity=sw.checked?0:1

}

/* AIGUILLE TOUCH */

let aiguille=document.getElementById("aiguille")
let hitbox=document.getElementById("hitbox")
let container=document.getElementById("game-container")

let drag=false

hitbox.addEventListener("pointerdown",e=>{

drag=true
updateAngle(e)

})

document.addEventListener("pointerup",()=>drag=false)

document.addEventListener("pointermove",e=>{

if(!drag) return
updateAngle(e)

})

function updateAngle(e){

let rect=container.getBoundingClientRect()

let cx=rect.left+rect.width/2
let cy=rect.top+rect.height/2

let x=e.clientX-cx
let y=e.clientY-cy

let angle

if(y>0){

angle=x>0?90:-90

}else{

angle=Math.atan2(y,x)*(180/Math.PI)+90

}

aiguille.style.transform="rotate("+angle+"deg)"

}

/* SCORE */

let scores=[0,0]

function addScore(p,v){

scores[p-1]+=v

document.getElementById("score"+p).textContent=scores[p-1]

}

function resetScores(){

scores=[0,0]

score1.textContent=0
score2.textContent=0

}

</script>

</body>
</html>
